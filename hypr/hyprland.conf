monitor=,preferred,auto,auto

$terminal = kitty
$fileManager = nautilus
$menu = fuzzel --no-icons
$browser = zen-browser

# exec-once = $terminal
# exec-once = nm-applet &
exec-once = qs -c noctalia-shell

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

general {
    gaps_in = 5
    gaps_out = 10

    border_size = 2

    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = false

    allow_tearing = false

    layout = scrolling
}

decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 0.85
    inactive_opacity = 0.75
    fullscreen_opacity = 1

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 7
        passes = 3
        ignore_opacity = true
        xray = true
        new_optimizations = true
        brightness = 0.8
        contrast = 0.8
        popups = true
    }
}

animations {
    enabled = yes, please :)

    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     2,     default, slidevert 
    animation = zoomFactor,    1,     7,     quick
}


dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

master {
    new_status = master
}
scrolling {
    fullscreen_on_one_column = false
    explicit_column_widths = 0.3, 0.5, 0.7
}

misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}

input {
    mouse {
        
    }
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = altwin:swap_alt_win, caps:escape
    kb_rules =

    follow_mouse = 1
    accel_profile = "flat"
    force_no_accel = true

    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, Return, 	exec, $terminal
bind = $mainMod, W, 		killactive,
bind = $mainMod_Ctrl, Escape, 	exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod_Shift, F, 	exec, $fileManager
bind = $mainMod_Shift, B, 	exec, $browser
bind = $mainMod, Space, 	exec, $menu

bindel = , XF86AudioRaiseVolume, exec, qs -c noctalia-shell ipc call volume increase
bindel = , XF86AudioLowerVolume, exec, qs -c noctalia-shell ipc call volume decrease
bindl  = , XF86AudioMute,        exec, qs -c noctalia-shell ipc call volume muteInput
bindl  = , XF86AudioNext,        exec, qs -c noctalia-shell ipc call media next
bindl  = , XF86AudioPrev,        exec, qs -c noctalia-shell ipc call media previous
bindl  = , XF86AudioPlay,        exec, qs -c noctalia-shell ipc call media playPause
bindl  = , XF86AudioPause,       exec, qs -c noctalia-shell ipc call media playPause

bind = $mainMod, L, 	layoutmsg, move +col
bind = $mainMod, J,     movefocus, d
bind = $mainMod, K,     movefocus, u
bind = $mainMod, H, 	layoutmsg, move -col
bind = $mainMod, left,  layoutmsg, move -col
bind = $mainMod, down,  movefocus, d
bind = $mainMod, up,    movefocus, u
bind = $mainMod, right, layoutmsg, move +col

bind = $mainMod, S,  	  togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod SHIFT, H,     layoutmsg, swapcol l
bind = $mainMod SHIFT, J,     movewindow, d
bind = $mainMod SHIFT, K,     movewindow, u
bind = $mainMod SHIFT, L,     layoutmsg, swapcol r
bind = $mainMod SHIFT, left,  layoutmsg, swapcol l
bind = $mainMod SHIFT, down,  movewindow, d
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, right, layoutmsg, swapcol r

bind = $mainMod, mouse_down,  	   layoutmsg, move -col
bind = $mainMod, mouse_up,    	   layoutmsg, move +col
bind = $mainMod SHIFT, mouse_down, layoutmsg, swapcol l
bind = $mainMod SHIFT, mouse_up,   layoutmsg, swapcol r

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5

bind = $mainMod CTRL, F, fullscreen, 0       # true fullscreen
bind = $mainMod, F,      fullscreen, 1       # maximize (was maximize-column)
bind = $mainMod, T, 	 togglefloating

binde = $mainMod, minus,       resizeactive, -100 0
binde = $mainMod, equal,       resizeactive,  100 0
binde = $mainMod SHIFT, minus, resizeactive, 0 -100
binde = $mainMod SHIFT, equal, resizeactive, 0  100
bind = $mainMod, R, layoutmsg, colresize +conf

bind = CTRL SHIFT, 1, exec, f=$(grimblast save area ~/Pictures/Screenshots/$(date +%s).png) && notify-send "Screenshot" "Saved" -i "$f"
bind = CTRL SHIFT, 2, exec, f=$(grimblast save screen ~/Pictures/Screenshots/$(date +%s).png) && notify-send "Screenshot" "Saved" -i "$f"
bind = CTRL SHIFT, 3, exec, f=$(grimblast save active ~/Pictures/Screenshots/$(date +%s).png) && notify-send "Screenshot" "Saved" -i "$f"

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod CTRL, Escape, exit
bind = $mainMod CTRL, P,      dpms, off


windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule = workspace 1, 
windowrule = workspace 2, match:class zen
windowrule = workspace 3, match:class discord
windowrule = workspace 4, match:class spotify
	
source = /home/sudha/.config/hypr/noctalia/noctalia-colors.conf
